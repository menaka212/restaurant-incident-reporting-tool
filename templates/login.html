<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Restaurant Incident Tool</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body {

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );

            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {

            width: 430px;

            background: rgba(255,255,255,0.1);

            backdrop-filter: blur(12px);

            border-radius: 20px;

            padding: 40px;

            box-shadow: 0 8px 30px rgba(0,0,0,0.3);

            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo {

            width: 90px;
            height: 90px;

            background: rgba(255,255,255,0.15);

            border-radius: 50%;

            display: flex;
            justify-content: center;
            align-items: center;

            margin: auto;
            margin-bottom: 20px;

            color: white;

            font-size: 40px;
        }

        .title {

            text-align: center;

            color: white;

            font-weight: bold;

            margin-bottom: 5px;
        }

        .subtitle {

            text-align: center;

            color: #cbd5e1;

            margin-bottom: 30px;
        }

        .form-control {

            border-radius: 12px;

            padding: 12px;

            border: none;
        }

        .input-group-text {

            border-radius: 12px 0 0 12px;

            border: none;
        }

        .btn-login {

            width: 100%;

            border-radius: 12px;

            padding: 12px;

            font-weight: bold;

            transition: 0.3s;
        }

        .btn-login:hover {

            transform: translateY(-2px);

        }

        .footer-text {

            text-align: center;

            color: #cbd5e1;

            margin-top: 20px;

            font-size: 14px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        <i class="bi bi-exclamation-diamond-fill"></i>

    </div>

    <h2 class="title">
        Incident Reporting Tool
    </h2>

    <p class="subtitle">
        Restaurant Operations Management System
    </p>

    <form method="POST">

        {% csrf_token %}

        <!-- Username -->

        <div class="input-group mb-3">

            <span class="input-group-text">

                <i class="bi bi-person-fill"></i>

            </span>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter Username"
                   required>

        </div>

        <!-- Password -->

        <div class="input-group mb-4">

            <span class="input-group-text">

                <i class="bi bi-lock-fill"></i>

            </span>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>

        </div>

        <!-- Login Button -->

        <button type="submit"
                class="btn btn-warning btn-login">

            <i class="bi bi-box-arrow-in-right"></i>
            Login

        </button>

    </form>

    <div class="footer-text">

        Restaurant Incident Reporting Tool © 2025

    </div>

</div>

</body>

</html>
