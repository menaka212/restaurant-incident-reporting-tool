{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2>Update Incident</h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form|crispy }}

            <button class="btn btn-success mt-3">
                Update Incident
            </button>

        </form>

    </div>

</div>

{% endblock %}
